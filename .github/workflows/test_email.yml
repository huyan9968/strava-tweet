name: 测试邮件发送

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install playwright requests && playwright install chromium --with-deps

      - name: Install Chinese fonts
        run: sudo apt-get install -y fonts-noto-cjk

      - name: 生成卡片并发送邮件
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          python - <<'EOF'
          import sys, os, smtplib
          from email.mime.multipart import MIMEMultipart
          from email.mime.text import MIMEText
          from email.mime.image import MIMEImage
          sys.path.insert(0, '.')
          from generate_xhs_card import create_xhs_card, get_xhs_text_caption

          card = create_xhs_card(
              distance_km=10.5, duration_sec=3981, speed_ms=2.637,
              heart_rate=127, calories=600,
              date_str='2026-05-06', start_hour=6,
              output_path='/tmp/test_card.png',
          )
          caption = get_xhs_text_caption(10.5, 3981, 2.637, 127, 600)

          gmail_user = os.environ['GMAIL_USER']
          gmail_pass = os.environ['GMAIL_APP_PASSWORD']

          msg = MIMEMultipart('related')
          msg['From']    = gmail_user
          msg['To']      = gmail_user
          msg['Subject'] = '🏃 测试：小红书卡片邮件'

          html = f"""
          <html><body>
          <p>这是一封测试邮件，确认卡片图片可以正常显示。</p>
          <img src="cid:xhs_card" style="max-width:540px;display:block;margin:20px auto;border-radius:16px;">
          <pre style="margin-top:20px;color:#333;">{caption}</pre>
          </body></html>"""
          msg.attach(MIMEText(html, 'html', 'utf-8'))

          with open(card, 'rb') as f:
              img = MIMEImage(f.read(), _subtype='png')
          img.add_header('Content-ID', '<xhs_card>')
          img.add_header('Content-Disposition', 'inline', filename='xhs_card.png')
          msg.attach(img)

          with smtplib.SMTP('smtp.gmail.com', 587) as smtp:
              smtp.starttls()
              smtp.login(gmail_user, gmail_pass)
              smtp.send_message(msg)
          print('邮件发送成功！')
          EOF
