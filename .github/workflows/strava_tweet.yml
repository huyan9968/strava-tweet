name: Strava 跑步记录

on:
  schedule:
    - cron: '0 13 * * *'   # 每天北京时间 21:00 兜底运行
  workflow_dispatch:         # 支持手动触发
  repository_dispatch:       # Strava Webhook 实时触发
    types: [strava_activity]

jobs:
  generate-tweet:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Chinese fonts
        run: sudo apt-get install -y fonts-noto-cjk

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browser
        run: playwright install chromium --with-deps

      - name: Run strava tweet
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
          STRAVA_VERIFY_TOKEN: ${{ secrets.STRAVA_VERIFY_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
        run: python strava_tweet.py

      - name: 提交数据更新
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add data/activities.json runs/ maps/
          if git diff --staged --quiet; then
            echo "没有新数据需要提交"
          else
            git commit -m "data: 更新跑步数据 $(date -u '+%Y-%m-%d %H:%M:%S')"
            git pull --rebase origin main
            git push
          fi
