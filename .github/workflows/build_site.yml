
name: 构建跑步主页

on:
  schedule:
    - cron: '0 2 * * *'   # 每天 UTC 2:00 (北京时间 10:00) 构建
  workflow_dispatch:       # 支持手动触发
  repository_dispatch:     # 新活动数据更新时触发
    types: [strava_activity]

jobs:
  build-site:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 生成静态网站
        run: python build_site.py

      - name: 配置 Git
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'

      - name: 提交更改
        run: |
          git add -A
          if git diff --staged --quiet; then
            echo "没有更改需要提交"
          else
            git commit -m "site: 更新跑步主页 $(date -u '+%Y-%m-%d %H:%M:%S')"
            git push
          fi
