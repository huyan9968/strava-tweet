<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+QingKe+HuangYou&family=Noto+Sans+SC:wght@400;700;900&family=Inter:wght@900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px; height: 1350px;
  overflow: hidden;
  font-family: 'ZCOOL QingKe HuangYou', 'Noto Sans SC', sans-serif;
}

.bg {
  position: absolute; inset: 0;
  background: linear-gradient(175deg,
    #0a0e27 0%,
    #111433 25%,
    #1a1f4a 55%,
    #0e2240 80%,
    #071428 100%);
}

.stars { position: absolute; inset: 0; }

.glow-1 {
  position: absolute;
  width: 500px; height: 500px; border-radius: 50%;
  background: radial-gradient(circle, rgba(99,102,241,0.18) 0%, transparent 70%);
  top: -100px; right: -100px;
}
.glow-2 {
  position: absolute;
  width: 400px; height: 400px; border-radius: 50%;
  background: radial-gradient(circle, rgba(16,185,129,0.1) 0%, transparent 70%);
  top: 300px; left: -80px;
}

.moon {
  position: absolute;
  top: 70px; right: 120px;
  width: 110px; height: 110px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #fffde7, #fff9c4);
  box-shadow: 0 0 40px rgba(255,249,196,0.4), 0 0 80px rgba(255,249,196,0.15);
}
.moon-crater1 { position: absolute; width: 18px; height: 18px; border-radius: 50%; background: rgba(0,0,0,0.06); top: 22px; left: 28px; }
.moon-crater2 { position: absolute; width: 11px; height: 11px; border-radius: 50%; background: rgba(0,0,0,0.05); top: 52px; left: 58px; }

.skyline {
  position: absolute;
  bottom: 330px; left: 0; right: 0;
  height: 160px;
}

.ground {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 336px;
  background: linear-gradient(180deg, #0d1b12 0%, #0a1510 100%);
}
.ground::before {
  content: '';
  position: absolute;
  top: -20px; left: -20px; right: -20px;
  height: 44px;
  background: #162a1c;
  border-radius: 50%;
}

.track {
  position: absolute;
  bottom: 328px; left: 0; right: 0;
  height: 6px;
  background: rgba(99,230,190,0.35);
}
.track-dashes {
  position: absolute;
  bottom: 346px; left: 0; right: 0;
  height: 5px;
  background: repeating-linear-gradient(90deg,
    rgba(99,230,190,0.5) 0, rgba(99,230,190,0.5) 55px,
    transparent 55px, transparent 100px);
}

.card {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 336px;
  background: linear-gradient(180deg, #111827 0%, #0d1117 100%);
  border-radius: 52px 52px 0 0;
  border-top: 1.5px solid rgba(99,230,190,0.2);
  box-shadow: 0 -2px 40px rgba(0,0,0,0.5);
  padding: 42px 68px 40px;
  display: flex; flex-direction: column; gap: 22px;
}
.stats-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
}
.stat {
  display: flex; flex-direction: column;
  align-items: center; gap: 8px;
  border-right: 1px solid rgba(255,255,255,0.06);
}
.stat:last-child { border-right: none; }
.stat-val {
  font-family: 'Inter', 'Noto Sans SC', sans-serif;
  font-size: 44px; font-weight: 900;
  color: #f0fdf4; line-height: 1;
  letter-spacing: -1.5px;
}
.stat-lbl {
  font-size: 21px; color: #4b6358;
  font-family: 'Noto Sans SC', sans-serif;
}
.divider { height: 1px; background: rgba(255,255,255,0.06); }
.bottom-row {
  display: flex; justify-content: space-between; align-items: center;
}
.tags { font-size: 21px; color: #2d4a3e; font-family: 'Noto Sans SC', sans-serif; letter-spacing: 1px; }
.via { font-size: 20px; color: #2d4a3e; font-family: 'Noto Sans SC', sans-serif; }

.top-bar {
  position: absolute;
  top: 62px; left: 72px; right: 72px;
  display: flex; justify-content: space-between; align-items: flex-start;
  z-index: 20;
}
.date-tag {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 24px;
  padding: 8px 22px;
  font-size: 22px; color: rgba(255,255,255,0.7);
  font-family: 'Noto Sans SC', sans-serif;
  letter-spacing: 1px;
}
.date-main {
  font-size: 36px; font-weight: 700;
  color: #fff; margin-top: 10px;
  font-family: 'Noto Sans SC', sans-serif;
}
.done-badge {
  background: linear-gradient(135deg, #10b981, #059669);
  border-radius: 32px;
  padding: 12px 28px;
  font-size: 26px; font-weight: 700;
  color: #fff;
  box-shadow: 0 4px 20px rgba(16,185,129,0.4);
  display: flex; align-items: center; gap: 8px;
}

.dist-block {
  position: absolute;
  top: 205px; left: 72px;
  z-index: 20;
}
.dist-eyebrow {
  font-size: 22px; letter-spacing: 5px;
  color: rgba(255,255,255,0.35);
  font-family: 'Noto Sans SC', sans-serif;
  margin-bottom: 4px;
}
.dist-main { display: flex; align-items: flex-end; gap: 12px; }
.dist-num {
  font-family: 'Inter', sans-serif;
  font-size: 210px; font-weight: 900;
  color: #fff; line-height: 0.82;
  letter-spacing: -10px;
  text-shadow: 0 0 60px rgba(99,230,190,0.3);
}
.dist-km {
  font-family: 'Inter', sans-serif;
  font-size: 58px; font-weight: 900;
  color: #34d399;
  margin-bottom: 18px; letter-spacing: 2px;
}

.caption {
  position: absolute;
  bottom: 378px; left: 72px;
  z-index: 20;
  max-width: 560px;
}
.caption-inner {
  font-family: 'ZCOOL QingKe HuangYou', sans-serif;
  font-size: 60px;
  color: #fbbf24;
  text-shadow: 0 0 30px rgba(251,191,36,0.4);
  line-height: 1.25;
}
</style>
