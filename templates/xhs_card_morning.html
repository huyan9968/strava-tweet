<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+QingKe+HuangYou&family=Noto+Sans+SC:wght@400;700;900&family=Inter:wght@900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px; height: 1350px;
  overflow: hidden;
  font-family: 'ZCOOL QingKe HuangYou', 'Noto Sans SC', sans-serif;
}

.bg {
  position: absolute; inset: 0;
  background: linear-gradient(175deg,
    #a8d8f0 0%,
    #c8e8fa 18%,
    #fde8c8 50%,
    #ffc47a 72%,
    #ff8c42 88%,
    #e8622a 100%);
}

.sun-glow {
  position: absolute;
  width: 600px; height: 600px; border-radius: 50%;
  background: radial-gradient(circle, rgba(255,220,80,0.35) 0%, rgba(255,160,40,0.15) 45%, transparent 75%);
  top: -120px; right: -80px;
}

.sun {
  position: absolute;
  top: 58px; right: 108px;
  width: 130px; height: 130px;
  border-radius: 50%;
  background: radial-gradient(circle at 38% 38%, #fff7a0, #ffe040 55%, #ffb300);
  box-shadow:
    0 0 0 18px rgba(255,224,64,0.18),
    0 0 0 36px rgba(255,200,40,0.1),
    0 0 60px rgba(255,180,0,0.3);
}

.cloud {
  position: absolute;
  background: rgba(255,255,255,0.85);
  border-radius: 50px;
  box-shadow: 0 4px 20px rgba(255,255,255,0.4);
}
.cloud::before, .cloud::after {
  content: '';
  position: absolute;
  background: rgba(255,255,255,0.85);
  border-radius: 50%;
}
.c1 { top: 80px; left: 60px; width: 180px; height: 55px; }
.c1::before { width: 90px; height: 80px; top: -38px; left: 25px; }
.c1::after  { width: 65px; height: 60px; top: -28px; left: 90px; }

.c2 { top: 160px; left: 280px; width: 130px; height: 42px; }
.c2::before { width: 70px; height: 60px; top: -28px; left: 18px; }
.c2::after  { width: 50px; height: 46px; top: -22px; left: 68px; }

.c3 { top: 200px; right: 280px; width: 110px; height: 36px; opacity: 0.7; }
.c3::before { width: 60px; height: 52px; top: -24px; left: 14px; }
.c3::after  { width: 44px; height: 38px; top: -18px; left: 58px; }

.ground {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 336px;
  background: linear-gradient(180deg, #e8f5e9 0%, #f1f8f2 100%);
}
.ground::before {
  content: '';
  position: absolute;
  top: -32px; left: -20px; right: -20px;
  height: 60px;
  background: linear-gradient(180deg, #a5d6a7 0%, #81c784 100%);
  border-radius: 50%;
}
.ground::after {
  content: '';
  position: absolute;
  top: -14px; left: 0; right: 0;
  height: 24px;
  background: #c8e6c9;
  border-radius: 50%;
}

.track {
  position: absolute;
  bottom: 328px; left: 0; right: 0;
  height: 6px;
  background: rgba(255,140,66,0.4);
}
.track-dashes {
  position: absolute;
  bottom: 346px; left: 0; right: 0;
  height: 5px;
  background: repeating-linear-gradient(90deg,
    rgba(255,140,66,0.6) 0, rgba(255,140,66,0.6) 55px,
    transparent 55px, transparent 100px);
}

.card {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 336px;
  background: linear-gradient(180deg, #ffffff 0%, #fafcff 100%);
  border-radius: 52px 52px 0 0;
  border-top: 1.5px solid rgba(255,140,66,0.25);
  box-shadow: 0 -4px 40px rgba(230,98,42,0.1);
  padding: 42px 68px 40px;
  display: flex; flex-direction: column; gap: 22px;
}
.stats-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
}
.stat {
  display: flex; flex-direction: column;
  align-items: center; gap: 8px;
  border-right: 1px solid rgba(0,0,0,0.06);
}
.stat:last-child { border-right: none; }
.stat-val {
  font-family: 'Inter', 'Noto Sans SC', sans-serif;
  font-size: 44px; font-weight: 900;
  color: #1e293b; line-height: 1;
  letter-spacing: -1.5px;
}
.stat-lbl {
  font-size: 21px; color: #94a3b8;
  font-family: 'Noto Sans SC', sans-serif;
}
.divider { height: 1px; background: rgba(0,0,0,0.05); }
.bottom-row {
  display: flex; justify-content: space-between; align-items: center;
}
.tags { font-size: 21px; color: #cbd5e1; font-family: 'Noto Sans SC', sans-serif; letter-spacing: 1px; }
.via { font-size: 20px; color: #cbd5e1; font-family: 'Noto Sans SC', sans-serif; }

.top-bar {
  position: absolute;
  top: 62px; left: 72px; right: 72px;
  display: flex; justify-content: space-between; align-items: flex-start;
  z-index: 20;
}
.date-tag {
  background: rgba(255,255,255,0.65);
  backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.9);
  border-radius: 24px;
  padding: 8px 22px;
  font-size: 22px; color: #7c4a0a;
  font-family: 'Noto Sans SC', sans-serif;
  letter-spacing: 1px;
}
.date-main {
  font-size: 36px; font-weight: 700;
  color: #fff; margin-top: 10px;
  font-family: 'Noto Sans SC', sans-serif;
  text-shadow: 0 2px 12px rgba(180,80,0,0.3);
}
.done-badge {
  background: linear-gradient(135deg, #ff8c42, #e8622a);
  border-radius: 32px;
  padding: 12px 28px;
  font-size: 26px; font-weight: 700;
  color: #fff;
  box-shadow: 0 4px 20px rgba(232,98,42,0.4);
  display: flex; align-items: center; gap: 8px;
}

.dist-block {
  position: absolute;
  top: 205px; left: 72px;
  z-index: 20;
}
.dist-eyebrow {
  font-size: 22px; letter-spacing: 5px;
  color: rgba(255,255,255,0.65);
  font-family: 'Noto Sans SC', sans-serif;
  margin-bottom: 4px;
  text-shadow: 0 1px 6px rgba(0,0,0,0.15);
}
.dist-main { display: flex; align-items: flex-end; gap: 12px; }
.dist-num {
  font-family: 'Inter', sans-serif;
  font-size: 210px; font-weight: 900;
  color: #fff; line-height: 0.82;
  letter-spacing: -10px;
  text-shadow: 0 4px 30px rgba(200,100,0,0.25), 0 8px 60px rgba(0,0,0,0.1);
}
.dist-km {
  font-family: 'Inter', sans-serif;
  font-size: 58px; font-weight: 900;
  color: #ff6b00;
  margin-bottom: 18px; letter-spacing: 2px;
  text-shadow: 0 2px 12px rgba(255,107,0,0.3);
}

.caption {
  position: absolute;
  bottom: 378px; left: 72px;
  z-index: 20;
  max-width: 560px;
}
.caption-inner {
  font-family: 'ZCOOL QingKe HuangYou', sans-serif;
  font-size: 60px;
  color: #c2410c;
  text-shadow: 0 2px 16px rgba(255,255,255,0.6);
  line-height: 1.25;
}
</style>
</head>
